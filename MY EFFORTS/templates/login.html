<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="{{ url_for('serve_manifest') }}">
  <meta name="theme-color" content="#0f766e">
  <title>Login | CareerForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#18232f; --muted:#6b7280; --line:#d8e1df; --cyan:#0f766e; --coral:#f9736b; --violet:#8b5cf6; --navy:#22313f; }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--ink);
      background:radial-gradient(circle at 10% 20%, rgba(15,118,110,.18), transparent 30%), radial-gradient(circle at 90% 12%, rgba(249,115,107,.16), transparent 28%), linear-gradient(135deg,#f7fcfb,#f6f0ff 52%,#fff8ed);
    }
    .wrap { width:min(460px,100%); }
    .home { display:inline-flex; margin-bottom:14px; color:var(--cyan); text-decoration:none; font-weight:800; }
    .card { background:white; border:1px solid var(--line); border-radius:8px; padding:28px; box-shadow:0 24px 70px rgba(25,47,79,.14); }
    h1 { margin:0 0 6px; font-size:32px; letter-spacing:0; background:linear-gradient(135deg,var(--ink),var(--cyan),var(--coral),var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sub { margin:0 0 20px; color:var(--muted); line-height:1.55; }
    label { display:block; margin:14px 0 7px; color:#334155; font-size:13px; font-weight:900; }
    .input { width:100%; min-height:50px; border:1px solid var(--line); border-radius:8px; padding:0 14px; font:inherit; background:#fbfdff; outline:none; }
    .input:focus { border-color:var(--cyan); box-shadow:0 0 0 4px rgba(15,118,110,.13); background:white; }
    .submit { width:100%; min-height:52px; margin-top:18px; border:0; border-radius:8px; color:white; background:linear-gradient(135deg,var(--cyan),var(--coral),var(--violet)); font:inherit; font-weight:900; cursor:pointer; }
    .forgot { display:block; text-align:center; margin-top:14px; color:var(--cyan); font-weight:800; }
    .switch { text-align:center; color:var(--muted); margin-top:16px; }
    .switch a { color:var(--cyan); font-weight:800; }
    .alert-success,.alert-error { padding:12px 14px; border-radius:8px; margin-bottom:14px; font-weight:800; font-size:14px; }
    .alert-success { background:#ecfdf5; border:1px solid #bbf7d0; color:#047857; }
    .alert-error { background:#fff1f2; border:1px solid #fecdd3; color:#be123c; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="home" href="{{ url_for('home') }}">Back to home</a>
    <div class="card">
      <h1>Login</h1>
      <p class="sub">Continue to your prediction form and saved career history.</p>

      {% if registered %}
        <div class="alert-success">Signup successful. Please log in with your credentials.</div>
      {% endif %}
      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login') }}" autocomplete="off">
        <label for="username">Username or Email</label>
        <input id="username" name="username" class="input" type="text" placeholder="harsha@example.com" required />
        <label for="password">Password</label>
        <input id="password" name="password" class="input" type="password" placeholder="Enter password" required />
        <button class="submit" type="submit">Login</button>
      </form>

      <a class="forgot" href="#">Forgot Password?</a>
      <div class="switch">Don't have an account? <a href="{{ url_for('signup') }}">Create account</a></div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
